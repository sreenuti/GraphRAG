<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>History of India GraphRAG Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f5f5f8;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
      }
      .container {
        max-width: 840px;
        width: 100%;
        padding: 2rem 1rem 4rem;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        color: #555;
        margin-bottom: 1.5rem;
      }
      .chat-window {
        background: white;
        border-radius: 1rem;
        box-shadow: 0 18px 60px rgba(15, 23, 42, 0.18);
        padding: 1rem 1.25rem;
        max-height: 65vh;
        overflow-y: auto;
      }
      .message {
        margin-bottom: 0.75rem;
        display: flex;
      }
      .message.user .bubble {
        background: #eef2ff;
        margin-left: auto;
      }
      .message.assistant .bubble {
        background: #fefce8;
        margin-right: auto;
      }
      .bubble {
        padding: 0.75rem 1rem;
        border-radius: 1rem;
        max-width: 80%;
        line-height: 1.4;
        white-space: pre-wrap;
      }
      .input-row {
        display: flex;
        margin-top: 1rem;
        gap: 0.5rem;
      }
      .input-row input {
        flex: 1;
        padding: 0.75rem 0.9rem;
        border-radius: 999px;
        border: 1px solid #d4d4dd;
        font-size: 0.95rem;
      }
      .input-row button {
        border-radius: 999px;
        padding: 0.75rem 1.2rem;
        border: none;
        background: #4f46e5;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      .input-row button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .followups {
        margin-top: 0.75rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .followups button {
        border-radius: 999px;
        border: 1px solid #d4d4dd;
        background: white;
        padding: 0.35rem 0.75rem;
        font-size: 0.85rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>History of India GraphRAG Chat</h1>
      <div class="subtitle">
        Ask questions about the History of India. Answers come from Neo4j graph +
        RAG context.
      </div>
      <div class="chat-window" id="chat"></div>
      <div class="followups" id="followups"></div>
      <div class="input-row">
        <input
          id="input"
          placeholder="Type your question about the History of India..."
        />
        <button id="send">Ask</button>
      </div>
    </div>
    <script>
      const chatEl = document.getElementById("chat");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const followupsEl = document.getElementById("followups");

      /** Messages we send to the backend, including roles */
      const messages = [];

      function renderMessages() {
        chatEl.innerHTML = "";
        for (const msg of messages) {
          const div = document.createElement("div");
          div.className = "message " + msg.role;
          const bubble = document.createElement("div");
          bubble.className = "bubble";
          bubble.textContent = msg.content;
          div.appendChild(bubble);
          chatEl.appendChild(div);
        }
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function renderFollowups(followups) {
        followupsEl.innerHTML = "";
        if (!followups || !followups.length) return;
        for (const q of followups) {
          const btn = document.createElement("button");
          btn.textContent = q;
          btn.onclick = () => {
            inputEl.value = q;
            send();
          };
          followupsEl.appendChild(btn);
        }
      }

      async function send() {
        const question = inputEl.value.trim();
        if (!question) return;
        inputEl.value = "";
        sendBtn.disabled = true;

        messages.push({ role: "user", content: question });
        renderMessages();
        renderFollowups([]);

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, messages }),
          });
          const data = await res.json();
          if (data.error) {
            messages.push({
              role: "assistant",
              content: "Error: " + data.error,
            });
          } else {
            messages.push({ role: "assistant", content: data.answer });
            renderFollowups(data.followups || []);
          }
        } catch (e) {
          messages.push({
            role: "assistant",
            content: "Error talking to backend: " + e,
          });
        } finally {
          renderMessages();
          sendBtn.disabled = false;
        }
      }

      sendBtn.onclick = send;
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          send();
        }
      });
    </script>
  </body>
  </html>
